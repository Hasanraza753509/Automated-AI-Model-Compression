services:
  - type: web
    name: compressai-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: CORS_ORIGINS
        value: https://automated-ai-model-compression.vercel.app
      - key: MAX_FILE_SIZE_MB
        value: "500"
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /api/v1/health
    plan: free
